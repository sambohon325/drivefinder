services:
  drivefinder:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-me}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - drivefinder_data:/app/data
      - drivefinder_images:/app/image_cache

volumes:
  drivefinder_data:
  drivefinder_images:
